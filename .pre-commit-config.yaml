# Ruff pre-commit hooks. Linter runs first (may rewrite imports/code via the I
# rule and other autofixes), then the formatter normalizes the result.
# Keep `rev` in lockstep with the pinned ruff in pyproject.toml's dev group.
#
# Setup:
#   uv tool install pre-commit   # or: pipx install pre-commit
#   pre-commit install           # register the git hook
#   pre-commit run --all-files   # one-time sweep
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ty resolves third-party imports from the project venv, so run it through
  # `uv run` (a local hook) rather than the isolated ty-pre-commit mirror, which
  # wouldn't see pandas/streamlit/highcharts-core (and would flag our
  # `# ty: ignore[...]` comments as unused). Checks the whole project, not just
  # staged files, so cross-module types resolve; the ty pinned in pyproject's
  # dev group is the one that runs. Keep that pin and the CI job in lockstep.
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
