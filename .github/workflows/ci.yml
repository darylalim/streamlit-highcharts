name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # No setup-python step: `uv sync` reads .python-version (3.12) and
      # fetches a matching managed interpreter automatically if one isn't present.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  lint:
    name: Lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Ruff is a standalone binary — no project sync needed. The pin matches
      # the ruff in pyproject.toml's dev group and the pre-commit rev. Both
      # gates are non-mutating; --output-format=github annotates PRs inline.
      - name: Ruff lint
        run: uvx ruff@0.15.16 check --output-format=github .

      - name: Ruff format check
        run: uvx ruff@0.15.16 format --check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Unlike Ruff, ty resolves third-party imports (pandas, streamlit,
      # highcharts-core) from the project venv, so sync first. `uv run` then
      # uses the ty pinned in the dev group (uv.lock) — same version as
      # pre-commit. --output-format=github annotates PRs inline.
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: ty check
        run: uv run ty check --output-format=github
